variables:
  NODE_DOCKER_IMAGE: public.ecr.aws/docker/library/node:24-alpine3.22

stages:
  - test

Test lattice:
  image: $NODE_DOCKER_IMAGE
  stage: test
  tags:
    - ci-runner
  script:
    - corepack enable
    - pnpm install --frozen-lockfile
    - pnpm test
    - pnpm run check
  rules:
    - if: '$CI_COMMIT_BRANCH || $CI_COMMIT_TAG'
