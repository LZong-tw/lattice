name: Feature Request
description: Propose a new capability for @lattice/core
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the proposal. Before filing:

        - For **provider-specific** features (a new built-in provider, behavior
          change in an existing one), please open the issue and propose the
          shape; we'll discuss before code.
        - For **contract changes** (anything affecting `LatticeProvider`,
          `LatticeHandlerResult`, `LatticeContext`, dispatcher merge rules,
          event lifecycle), expect a longer review — these affect every
          downstream provider. Reference
          [`docs/PROVIDER-AUTHORING.md`](../docs/PROVIDER-AUTHORING.md).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the real-world use case driving the request.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed shape
      description: |
        Concrete API sketch if you have one. Otherwise describe the desired
        behavior at a high level.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other approaches you've tried or rejected, and why. Existing workarounds
        in user-land.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Where should this live?
      options:
        - "@lattice/core (built-in / contract change)"
        - separate @lattice/* package
        - external provider (my own npm package)
        - not sure
    validations:
      required: true
